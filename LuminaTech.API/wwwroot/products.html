<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products — LuminaTech</title>
    <meta name="description"
        content="Explore LuminaTech's cutting-edge product lineup — quantum processors, neural interfaces, cloud solutions, and more.">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◈</text></svg>">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar scrolled" id="navbar">
        <div class="container">
            <a href="/" class="navbar-brand">
                <span class="logo-icon">◈</span>
                LUMINATECH
            </a>
            <ul class="nav-links" id="navLinks">
                <li><a href="/">Home</a></li>
                <li><a href="/products.html" style="color:var(--color-primary);">Products</a></li>
                <li><a href="/contact.html">Contact</a></li>
                <li><a href="/login.html" class="nav-cta" id="navAuthBtn">Get Started</a></li>
            </ul>
            <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">☰</button>
        </div>
    </nav>

    <!-- PAGE HEADER -->
    <div class="page-header">
        <div class="container">
            <span class="label">◈ OUR PRODUCTS</span>
            <h1 class="mt-2">Explore <span class="text-gradient">Innovation</span></h1>
            <p>From quantum hardware to enterprise software — discover the technology that's reshaping industries.</p>
        </div>
    </div>

    <!-- FILTER BAR + PRODUCTS -->
    <section class="section" style="padding-top:2rem;">
        <div class="container">
            <div class="filter-bar" id="filterBar">
                <button class="filter-btn active" data-category="all">All Products</button>
                <button class="filter-btn" data-category="Hardware">Hardware</button>
                <button class="filter-btn" data-category="Software">Software</button>
                <button class="filter-btn" data-category="Service">Services</button>
            </div>

            <div class="products-grid" id="productsGrid">
                <!-- Products loaded dynamically via JS -->
                <div class="text-center" style="grid-column:1/-1;">
                    <div class="loading-spinner"></div>
                    <p class="mt-2" style="color:var(--text-secondary);">Loading products...</p>
                </div>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <span>© 2024 LuminaTech. All rights reserved.</span>
            </div>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="/js/app.js"></script>
</body>

</html>
