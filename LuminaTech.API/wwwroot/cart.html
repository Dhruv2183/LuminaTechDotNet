<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart — LuminaTech</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◈</text></svg>">
</head>

<body>
    <nav class="navbar" id="navbar">
        <div class="container">
            <a href="/" class="navbar-brand"><span class="logo-icon">◈</span> LUMINATECH</a>
            <ul class="nav-links" id="navLinks">
                <li><a href="/">Home</a></li>
                <li><a href="/products.html">Products</a></li>
                <li><a href="/contact.html">Contact</a></li>
                <li><a href="/login.html" class="nav-cta" id="navAuthBtn">Get Started</a></li>
            </ul>
            <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">☰</button>
        </div>
    </nav>

    <main class="section" style="min-height:80vh;padding-top:120px;">
        <div class="container">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;">
                <div>
                    <span class="label">◈ SHOPPING CART</span>
                    <h2 class="mt-2">Your Cart</h2>
                </div>
                <a href="/wishlist.html" class="btn btn-outline btn-sm">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        style="vertical-align:-3px">
                        <path
                            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
                    </svg>
                    Wishlist
                </a>
            </div>

            <div id="cartContainer">
                <div class="text-center" style="padding:4rem 0;color:var(--text-secondary);">Loading...</div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <span>© 2024 LuminaTech. All rights reserved.</span>
            </div>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', loadCart);

        async function loadCart() {
            const container = document.getElementById('cartContainer');
            try {
                const res = await fetch('/api/cart', { credentials: 'include' });
                if (!res.ok) {
                    container.innerHTML = `<div class="text-center" style="padding:4rem 0;"><p style="color:var(--text-secondary);">Please <a href="/login.html" style="color:var(--color-primary);">log in</a> to view your cart.</p></div>`;
                    return;
                }
                const data = await res.json();
                if (!data.items || data.items.length === 0) {
                    container.innerHTML = `<div class="text-center" style="padding:4rem 0;">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1" style="margin-bottom:1rem;"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                        <p style="color:var(--text-secondary);margin-bottom:1rem;">Your cart is empty</p>
                        <a href="/products.html" class="btn btn-primary btn-sm">Browse Products</a>
                    </div>`;
                    return;
                }

                container.innerHTML = `
                <div style="display:grid;grid-template-columns:1fr 380px;gap:2rem;align-items:start;">
                    <div style="display:flex;flex-direction:column;gap:1rem;">
                        ${data.items.map(item => `
                            <div class="glass-card" style="display:flex;gap:1.5rem;align-items:center;padding:1.25rem;backdrop-filter:none;-webkit-backdrop-filter:none;background:var(--bg-card);">
                                <div style="width:100px;height:100px;border-radius:var(--radius-md);overflow:hidden;flex-shrink:0;">
                                    ${item.product.imageUrl ? `<img src="${item.product.imageUrl}" alt="${item.product.name}" style="width:100%;height:100%;object-fit:cover;">` : `<div style="width:100%;height:100%;background:linear-gradient(135deg,rgba(79,142,247,0.15),rgba(124,92,252,0.15));"></div>`}
                                </div>
                                <div style="flex:1;min-width:0;">
                                    <div style="font-size:0.7rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--color-primary);margin-bottom:0.25rem;">${item.product.category}</div>
                                    <div style="font-weight:600;margin-bottom:0.25rem;">${item.product.name}</div>
                                    <div style="color:var(--color-primary);font-weight:700;">$${item.product.price.toLocaleString('en-US', { minimumFractionDigits: 2 })}</div>
                                </div>
                                <div style="display:flex;align-items:center;gap:0.75rem;">
                                    <button class="btn btn-glass btn-sm" style="width:36px;height:36px;padding:0;display:flex;align-items:center;justify-content:center;font-size:1.2rem;" onclick="updateQty(${item.id},${item.quantity - 1})">−</button>
                                    <span style="font-weight:600;min-width:24px;text-align:center;">${item.quantity}</span>
                                    <button class="btn btn-glass btn-sm" style="width:36px;height:36px;padding:0;display:flex;align-items:center;justify-content:center;font-size:1.2rem;" onclick="updateQty(${item.id},${item.quantity + 1})">+</button>
                                </div>
                                <div style="text-align:right;min-width:80px;">
                                    <div style="font-weight:700;color:var(--text-primary);">$${(item.product.price * item.quantity).toLocaleString('en-US', { minimumFractionDigits: 2 })}</div>
                                </div>
                                <button onclick="removeItem(${item.id})" style="background:none;border:none;cursor:pointer;color:var(--text-muted);padding:0.5rem;" title="Remove">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                                </button>
                            </div>
                        `).join('')}
                    </div>

                    <!-- Order Summary -->
                    <div class="glass-card" style="position:sticky;top:100px;backdrop-filter:none;-webkit-backdrop-filter:none;background:var(--bg-card);">
                        <h3 style="margin-bottom:1.5rem;">Order Summary</h3>
                        <div style="display:flex;flex-direction:column;gap:0.75rem;margin-bottom:1.5rem;">
                            <div style="display:flex;justify-content:space-between;color:var(--text-secondary);">
                                <span>Subtotal (${data.items.reduce((a, i) => a + i.quantity, 0)} items)</span>
                                <span>$${data.total.toLocaleString('en-US', { minimumFractionDigits: 2 })}</span>
                            </div>
                            <div style="display:flex;justify-content:space-between;color:var(--text-secondary);">
                                <span>Shipping</span>
                                <span style="color:var(--color-success);">Free</span>
                            </div>
                            <div style="display:flex;justify-content:space-between;color:var(--text-secondary);">
                                <span>Tax</span>
                                <span>$${(data.total * 0.08).toLocaleString('en-US', { minimumFractionDigits: 2 })}</span>
                            </div>
                            <hr style="border:none;border-top:1px solid var(--glass-border);margin:0.5rem 0;">
                            <div style="display:flex;justify-content:space-between;font-weight:700;font-size:1.1rem;">
                                <span>Total</span>
                                <span style="color:var(--color-primary);">$${(data.total * 1.08).toLocaleString('en-US', { minimumFractionDigits: 2 })}</span>
                            </div>
                        </div>
                        <a href="/checkout.html" class="btn btn-primary" style="width:100%;text-align:center;display:block;">
                            Proceed to Checkout →
                        </a>
                        <a href="/products.html" class="btn btn-glass" style="width:100%;text-align:center;display:block;margin-top:0.75rem;">
                            Continue Shopping
                        </a>
                    </div>
                </div>`;
            } catch (e) {
                container.innerHTML = `<div class="text-center" style="padding:4rem 0;"><p style="color:var(--text-secondary);">Error loading cart.</p></div>`;
            }
        }

        async function updateQty(id, qty) {
            await fetch(`/api/cart/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ quantity: qty })
            });
            loadCart();
        }

        async function removeItem(id) {
            await fetch(`/api/cart/${id}`, { method: 'DELETE', credentials: 'include' });
            showToast('Removed from cart', 'info');
            loadCart();
        }
    </script>
</body>

</html>
