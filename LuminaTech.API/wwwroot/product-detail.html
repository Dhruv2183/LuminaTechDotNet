<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Detail — LuminaTech</title>
    <meta name="description" content="View product details, specs, and add to your wishlist.">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◈</text></svg>">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar scrolled" id="navbar">
        <div class="container">
            <a href="/" class="navbar-brand">
                <span class="logo-icon">◈</span>
                LUMINATECH
            </a>
            <ul class="nav-links" id="navLinks">
                <li><a href="/">Home</a></li>
                <li><a href="/products.html">Products</a></li>
                <li><a href="/contact.html">Contact</a></li>
                <li><a href="/login.html" class="nav-cta" id="navAuthBtn">Get Started</a></li>
            </ul>
            <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">☰</button>
        </div>
    </nav>

    <section class="section" style="padding-top:6rem;">
        <div class="container">
            <div class="product-detail-hero" id="productDetail">
                <div class="text-center" style="grid-column:1/-1;">
                    <div class="loading-spinner"></div>
                    <p class="mt-2" style="color:var(--text-secondary);">Loading product...</p>
                </div>
            </div>

            <!-- Related Products -->
            <div class="mt-4" id="relatedSection" style="display:none;">
                <h2 class="mb-3">Related <span class="text-gradient">Products</span></h2>
                <div class="related-products" id="relatedProducts"></div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <span>© 2024 LuminaTech. All rights reserved.</span>
            </div>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="/js/app.js"></script>

</html>
