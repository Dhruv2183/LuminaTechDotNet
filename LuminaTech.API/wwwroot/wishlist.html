<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist — LuminaTech</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◈</text></svg>">
</head>

<body>
    <nav class="navbar" id="navbar">
        <div class="container">
            <a href="/" class="navbar-brand"><span class="logo-icon">◈</span> LUMINATECH</a>
            <ul class="nav-links" id="navLinks">
                <li><a href="/">Home</a></li>
                <li><a href="/products.html">Products</a></li>
                <li><a href="/contact.html">Contact</a></li>
                <li><a href="/login.html" class="nav-cta" id="navAuthBtn">Get Started</a></li>
            </ul>
            <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">☰</button>
        </div>
    </nav>

    <main class="section" style="min-height:80vh;padding-top:120px;">
        <div class="container">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;">
                <div>
                    <span class="label">◈ YOUR WISHLIST</span>
                    <h2 class="mt-2">Saved Products</h2>
                </div>
                <a href="/cart.html" class="btn btn-outline btn-sm">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        style="vertical-align:-3px">
                        <circle cx="9" cy="21" r="1" />
                        <circle cx="20" cy="21" r="1" />
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
                    </svg>
                    View Cart
                </a>
            </div>

            <div id="wishlistContainer">
                <div class="text-center" style="padding:4rem 0;color:var(--text-secondary);">Loading...</div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <span>© 2024 LuminaTech. All rights reserved.</span>
            </div>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', loadWishlist);

        async function loadWishlist() {
            const container = document.getElementById('wishlistContainer');
            try {
                const res = await fetch('/api/wishlist', { credentials: 'include' });
                if (!res.ok) {
                    container.innerHTML = `<div class="text-center" style="padding:4rem 0;"><p style="color:var(--text-secondary);">Please <a href="/login.html" style="color:var(--color-primary);">log in</a> to view your wishlist.</p></div>`;
                    return;
                }
                const items = await res.json();
                if (items.length === 0) {
                    container.innerHTML = `<div class="text-center" style="padding:4rem 0;">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1" style="margin-bottom:1rem;"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                        <p style="color:var(--text-secondary);margin-bottom:1rem;">Your wishlist is empty</p>
                        <a href="/products.html" class="btn btn-primary btn-sm">Browse Products</a>
                    </div>`;
                    return;
                }

                container.innerHTML = `<div class="products-grid">${items.map(w => `
                    <div class="product-card" style="padding:0;background:var(--bg-card);">
                        <div class="product-image-container">
                            ${w.product.imageUrl ? `<img class="product-image" src="${w.product.imageUrl}" alt="${w.product.name}" style="height:200px;width:100%;object-fit:cover;">` : `<div style="height:200px;background:linear-gradient(135deg,rgba(79,142,247,0.1),rgba(124,92,252,0.1));"></div>`}
                        </div>
                        <div class="product-info">
                            <div class="product-category">${w.product.category}</div>
                            <div class="product-name">${w.product.name}</div>
                            <div class="product-price">$${w.product.price.toLocaleString('en-US', { minimumFractionDigits: 2 })}</div>
                            <div class="product-actions" style="flex-wrap:wrap;">
                                <button class="btn btn-primary btn-sm" onclick="moveToCart(${w.productId})">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                                    Move to Cart
                                </button>
                                <button class="btn btn-glass btn-sm" onclick="removeFromWishlist(${w.productId})" style="color:var(--color-danger);">Remove</button>
                            </div>
                        </div>
                    </div>
                `).join('')}</div>`;
            } catch (e) {
                container.innerHTML = `<div class="text-center" style="padding:4rem 0;"><p style="color:var(--text-secondary);">Error loading wishlist.</p></div>`;
            }
        }

        async function moveToCart(productId) {
            const res = await fetch(`/api/wishlist/move-to-cart/${productId}`, { method: 'POST', credentials: 'include' });
            if (res.ok) { showToast('Moved to cart!', 'success'); loadWishlist(); }
            else showToast('Failed to move to cart', 'error');
        }

        async function removeFromWishlist(productId) {
            const res = await fetch(`/api/wishlist/${productId}`, { method: 'DELETE', credentials: 'include' });
            if (res.ok) { showToast('Removed from wishlist', 'info'); loadWishlist(); }
        }
    </script>
</body>

</html>
